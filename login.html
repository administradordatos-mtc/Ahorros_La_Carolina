    <style>
        body {
            background-color: #0B0D0F;
            color: #e2e2e2;
            min-height: 100vh;
        }
        .c-frame {
            border-left: 1px solid rgba(241, 212, 127, 0.15);
            border-top: 1px solid rgba(241, 212, 127, 0.15);
        }
        .rojo-corazon {
            background-color: #C52724;
        }
    </style>
</head>
<body class="flex items-center justify-center p-margin-mobile">
    <div class="w-full max-w-md bg-[#171B1E] p-md md:p-lg rounded-xl c-frame border border-primary/10 flex flex-col gap-md">
        <!-- Logo/Header -->
        <div class="text-center">
            <h1 class="font-headline-lg text-4xl text-primary tracking-widest uppercase">LA CAROLINA MTC</h1>
            <p class="font-body-md text-body-md text-on-surface-variant mt-xs">Plataforma de Control de Ahorros Operativos</p>
        </div>

        <div class="h-[1px] bg-primary/10 my-xs"></div>

        <!-- Formulario -->
        <form id="login-form" class="space-y-md">
            <!-- Email -->
            <div class="flex flex-col gap-xs">
                <label for="email" class="font-label-sm text-label-sm text-on-surface-variant uppercase flex items-center gap-xs">
                    <span class="text-primary">»»»</span> Correo Electrónico
                </label>
                <input id="email" type="email" required class="bg-[#0B0D0F] border border-[#1E2226] text-on-surface font-body-md text-body-md px-sm py-xs rounded-lg focus:border-primary focus:ring-1 focus:ring-primary/20 outline-none transition-all" placeholder="usuario@lacarolina.com"/>
            </div>

            <!-- Contraseña -->
            <div class="flex flex-col gap-xs">
                <label for="password" class="font-label-sm text-label-sm text-on-surface-variant uppercase flex items-center gap-xs">
                    <span class="text-primary">»»»</span> Contraseña
                </label>
                <input id="password" type="password" required class="bg-[#0B0D0F] border border-[#1E2226] text-on-surface font-body-md text-body-md px-sm py-xs rounded-lg focus:border-primary focus:ring-1 focus:ring-primary/20 outline-none transition-all" placeholder="••••••••"/>
            </div>

            <!-- Error Message -->
            <div id="error-message" class="hidden text-on-error-container bg-error-container/20 border border-error-container/30 px-sm py-xs rounded-lg text-body-md font-body-md flex items-center gap-xs">
                <span class="material-symbols-outlined text-sm">error</span>
                <span id="error-text">Credenciales inválidas.</span>
            </div>

            <!-- Iniciar Sesión Button -->
            <button type="submit" class="w-full rojo-corazon hover:bg-on-secondary-fixed-variant text-white font-headline-md text-headline-md py-sm rounded-xl transition-all active:scale-[0.98] shadow-lg shadow-secondary-container/20 flex items-center justify-center gap-sm">
                INICIAR SESIÓN
                <span class="material-symbols-outlined">login</span>
            </button>
        </form>

        <div class="text-center mt-xs">
            <p class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">Transporte con Corazón</p>
        </div>
    </div>

    <!-- Integración con Supabase Auth -->
    <script type="module">
        import { supabase } from './src/js/supabase.js';

        const form = document.getElementById('login-form');
        const errorMessage = document.getElementById('error-message');
        const errorText = document.getElementById('error-text');
        const submitBtn = form.querySelector('button[type="submit"]');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMessage.classList.add('hidden');
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            // Feedback visual
            const originalBtnContent = submitBtn.innerHTML;
            submitBtn.innerHTML = 'INGRESANDO...';
            submitBtn.disabled = true;

            try {
                // 1. Iniciar sesión en Supabase Auth
                const { data: authData, error: authError } = await supabase.auth.signInWithPassword({
                    email,
                    password
                });

                if (authError) throw authError;

                // 2. Obtener perfil para validar el rol del usuario
                const { data: perfilData, error: perfilError } = await supabase
                    .from('perfiles')
                    .select('rol')
                    .eq('id', authData.user.id)
                    .single();

                if (perfilError) throw perfilError;

                // Guardar rol en localStorage para accesos rápidos en vistas
                localStorage.setItem('user_role', perfilData.rol);

                // 3. Redireccionar al dashboard (index.html)
                window.location.href = 'index.html';

            } catch (error) {
                console.error('Error de autenticación:', error.message);
                errorText.textContent = error.message === 'Invalid login credentials' 
                    ? 'Correo o contraseña incorrectos.' 
                    : error.message;
                errorMessage.classList.remove('hidden');
                submitBtn.innerHTML = originalBtnContent;
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
